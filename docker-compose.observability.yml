services:
  #
  #   environment:
  #     OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
  #     OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  #     OTEL_SERVICE_NAME: api-1 
  #     OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local
 
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "4317:4317"   # OTLP gRPC (APIs send traces here)
      - "4318:4318"   # OTLP HTTP  (optional)
      - "3200:3200"   # Tempo query API (used by Grafana)
 
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
 
  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - tempo
      - prometheus
 
volumes:
  tempo-data:
  prometheus-data:
  grafana-data: