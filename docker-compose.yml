services:
  db:
    image: helpdesk-utp-db
    container_name: helpdesk-utp.db
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: helpdesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
 
  helpdesk-utp-auth:
    image: helpdesk-utp-auth
    container_name: helpdesk-utp.auth
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: helpdesk-utp.auth/Dockerfile
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Database=helpdesk;Username=postgres;Password=postgres
      Cors__AllowedOrigins__0: http://localhost:5173
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: helpdesk-utp.auth
    ports:
      - "5227:8080"
 
  helpdesk-utp-admin:
    image: helpdesk-utp-admin
    container_name: helpdesk-utp.admin
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: helpdesk-utp.admin/Dockerfile
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Database=helpdesk;Username=postgres;Password=postgres
      Cors__AllowedOrigins__0: http://localhost:5173
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: helpdesk-utp.admin
    ports:
      - "5110:8080"
 
  helpdesk-utp-support:
    image: helpdesk-utp-support
    container_name: helpdesk-utp.support
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: helpdesk-utp.support/Dockerfile
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Database=helpdesk;Username=postgres;Password=postgres
      Cors__AllowedOrigins__0: http://localhost:5173
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: helpdesk-utp.support
    ports:
      - "5093:8080"
 
  helpdesk-utp-user:
    image: helpdesk-utp-user
    container_name: helpdesk-utp.user
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: helpdesk-utp.user/Dockerfile
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Database=helpdesk;Username=postgres;Password=postgres
      Cors__AllowedOrigins__0: http://localhost:5173
      ApplyMigrationsOnStartup: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: helpdesk-utp.user
    ports:
      - "5200:8080"
 
  frontend:
    image: helpdesk-utp-frontend
    container_name: helpdesk-utp.frontend
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_API_URL: /auth-api
        VITE_USER_API_URL: /user-api
        VITE_SUPPORT_API_URL: /support-api
        VITE_ADMIN_API_URL: /admin-api
    depends_on:
      - helpdesk-utp-auth
      - helpdesk-utp-admin
      - helpdesk-utp-support
      - helpdesk-utp-user
    ports:
      - "80:80"
 
 
volumes:
  postgres_data: