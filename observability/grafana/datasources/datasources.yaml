apiVersion: 1
 
datasources:
  - name: Tempo
    type: tempo
    uid: tempo-uid
    url: http://tempo:3200
    isDefault: false
    jsonData:
      tracesToMetrics:
        datasourceUid: prometheus-uid   # jump from a trace span → Prometheus metrics
        tags:
          - key: service.name
            value: service
        queries:
          - name: Request rate
            query: rate(traces_spanmetrics_calls_total{$$__tags}[5m])
          - name: Error rate
            query: rate(traces_spanmetrics_calls_total{$$__tags,status_code="STATUS_CODE_ERROR"}[5m])
          - name: Duration p99
            query: histogram_quantile(0.99, rate(traces_spanmetrics_duration_seconds_bucket{$$__tags}[5m]))
      serviceMap:
        datasourceUid: prometheus-uid   # renders the service graph from Tempo
      nodeGraph:
        enabled: true
      search:
        hide: false
 
  - name: Prometheus
    type: prometheus
    uid: prometheus-uid
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo-uid      # click an exemplar → jump to trace in Tempo
 